<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistics | Unplanned Settlement Mapping and Visualization</title>
  <link rel="stylesheet" href="css/site.css" />
</head>
<body class="site-body dark-mode">
  <header class="site-header" id="site-header"></header>

  <main class="site-main">
    <div class="stats-filters">
      <select id="district-filter" aria-label="District">
        <option>Kinondoni</option>
      </select>
      <div class="stats-filter-actions">
        <label>from <select id="from-year"></select></label>
        <label style="margin-left:0.5rem;">to <select id="to-year"></select></label>
        <button class="btn-gold" type="button" id="download-all-btn" style="margin-left:0.75rem;">⬇ Download All Locations</button>
      </div>
    </div>

    <div class="stats-main-chart">
      <canvas id="stats-line-chart"></canvas>
    </div>

    <div class="stats-bottom">
      <section>
        <div class="panel-lime stats-panel-header">
          <h3>Trends of unplanned settlements in Wards</h3>
          <span class="stats-hint">Based on settlement map locations</span>
        </div>
        <div class="panel-dark stats-table-wrap">
          <table class="ward-table">
            <thead>
              <tr><th>Symbol</th><th>Name</th><th>Settlements</th><th>% Changes</th></tr>
            </thead>
            <tbody id="ward-tbody">
              <tr><td colspan="4">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel-dark">
        <div class="stats-panel-header-row">
          <h3 style="color:var(--gold);">District growth</h3>
          <select id="growth-year"><option>for 2020</option></select>
        </div>
        <p class="stats-hint" style="margin-bottom:0.75rem;">Click ⬇ to download CSV report per district</p>
        <div class="district-bars" id="district-bars"></div>
        <div id="district-legend" style="margin-top:1rem;font-size:0.78rem;"></div>
      </section>
    </div>

    <p id="district-context" style="margin-top:1.5rem;color:var(--text-muted);font-size:0.85rem;line-height:1.6;">
      Loading district summary from settlement map data…
    </p>

    <div class="stats-strip" style="margin-top:1.25rem;">
      <div class="stat-item"><div class="num" id="stat-daily">—</div><div class="lbl">Daily Visitors</div></div>
      <div class="stat-item"><div class="num" id="stat-monthly">—</div><div class="lbl">Monthly Visitors</div></div>
      <div class="stat-item"><div class="num" id="stat-yearly">—</div><div class="lbl">Yearly Visitors</div></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="js/env.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/activity.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/statistics.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      SiteNav.renderHeader('statistics.html');
      SiteNav.renderFooter();
      Theme.init();
      Activity.init('/statistics.html');
      await Statistics.init();
    });
  </script>
</body>
</html>
