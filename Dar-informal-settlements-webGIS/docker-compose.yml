version: '3.9'

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: darinformal-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-darinformal}
      POSTGRES_USER: ${POSTGRES_USER:-darinformal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darinformal}
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./backend/data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-darinformal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: darinformal-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-darinformal}:${POSTGRES_PASSWORD:-darinformal}@postgis:5432/${POSTGRES_DB:-darinformal}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-darinformal}:${POSTGRES_PASSWORD:-darinformal}@postgis:5432/${POSTGRES_DB:-darinformal}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["http://localhost","http://localhost:80"]'
    volumes:
      - ./backend:/app
      - ./backend/data/geojson:/app/data/geojson:ro
    ports:
      - "8000:8000"
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: darinformal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgis_data:
