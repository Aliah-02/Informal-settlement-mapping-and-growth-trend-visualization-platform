# Render Blueprint — Backend + PostgreSQL
# Root directory in Render dashboard: Dar-informal-settlements-webGIS

databases:
  - name: darinformal-db
    plan: free
    databaseName: darinformal
    user: darinformal
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: darinformal-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: darinformal-db
          property: connectionString
      - key: USE_POSTGIS
        value: "true"
      - key: AUTO_IMPORT_ON_STARTUP
        value: "true"
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://informal-settlement-mapping-and-gro.vercel.app
      - key: PYTHONPATH
        value: /app
