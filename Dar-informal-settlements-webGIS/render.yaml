# DarInformal — Render Blueprint (Backend + PostgreSQL)
# Deploy: https://dashboard.render.com/ → New Blueprint → connect repo
# Set root directory to: Dar-informal-settlements-webGIS

databases:
  - name: darinformal-db
    plan: free
    databaseName: darinformal
    user: darinformal
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: darinformal-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: darinformal-db
          property: connectionString
      - key: USE_POSTGIS
        value: "true"
      - key: AUTO_IMPORT_ON_STARTUP
        value: "true"
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        sync: false
      # Optional — leave unset or use JSON array / comma-separated URLs.
      # FRONTEND_URL alone is enough for CORS if CORS_ORIGINS is not set.
      - key: CORS_ORIGINS
        sync: false
