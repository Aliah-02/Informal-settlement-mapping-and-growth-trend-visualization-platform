# Render Blueprint — repository root
# Dashboard: Root Directory = (leave empty)
# IMPORTANT: Environment must be "Docker" (not Python). Dockerfile path: ./Dockerfile

databases:
  - name: darinformal-db
    plan: free
    databaseName: darinformal
    user: darinformal
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: informal-settlement-mapping-and-growth
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: darinformal-db
          property: connectionString
      - key: USE_POSTGIS
        value: "true"
      - key: AUTO_IMPORT_ON_STARTUP
        value: "true"
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://informal-settlement-mapping-and-gro.vercel.app
      - key: PYTHONPATH
        value: /app
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@lsm2group11.com
      - key: ADMIN_PASSWORD
        generateValue: true
